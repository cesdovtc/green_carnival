<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠色繽紛嘉年華 - 集印花</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #f0f9f0; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        
        /* 頁面 1 頂部 */
        header { background: #2e7d32; color: white; padding: 15px; text-align: center; border-radius: 0 0 15px 15px; }
        .promo-text { font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; }
        #current-time { font-size: 0.9rem; opacity: 0.9; }

        /* 印花樣式 */
        .stamp-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .stamp { 
            width: 80px; height: 80px; background: #ddd; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; position: relative; margin: auto;
            border: 2px dashed #4caf50;
        }

        /* Tooltip 樣式 */
        .tooltip {
            visibility: hidden; background-color: #333; color: #fff; text-align: center;
            border-radius: 6px; padding: 5px 10px; position: absolute; z-index: 1;
            bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0;
            transition: opacity 0.3s; width: 120px; font-size: 0.8rem;
        }
        .stamp:hover .tooltip { visibility: visible; opacity: 1; }

        /* 彈出視窗 (Modal) */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
        }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; }
        .modal-content input { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }

        /* 導覽按鈕 */
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: white; border-top: 1px solid #eee; }
        nav button { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; }
        
        /* 頁面 2 活動資訊 */
        .info-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .info-card h2 { color: #2e7d32; margin-top: 0; }
        .icon-row { font-size: 1.2rem; margin: 10px 0; }
    </style>
</head>
<body>

<div id="page1" class="page active">
    <header>
        <div class="promo-text">集印花．換好禮．愛地球</div>
        <div id="current-time">正在載入時間...</div>
    </header>

    <div class="stamp-container">
        <div class="stamp">
            🌱
            <span class="tooltip">攤位 A：廢物利用工作坊</span>
        </div>
        <div class="stamp">
            ♻️
            <span class="tooltip">攤位 B：環保知識問答</span>
        </div>
        <div class="stamp">
            🌍
            <span class="tooltip">攤位 C：減塑行動挑戰</span>
        </div>
    </div>

    <div style="text-align: center; margin-top: 40px;">
        <button class="btn" onclick="simulateScan()">模擬掃描 QR Code</button>
    </div>
</div>

<div id="page2" class="page">
    <div class="info-card">
        <h2>綠色繽紛嘉年華 🌿</h2>
        <div class="icon-row">📅 <strong>日期：</strong> 2026年4月21日</div>
        <div class="icon-row">⏰ <strong>時間：</strong> 11:30 - 14:30</div>
        <hr>
        <p>歡迎大家齊來參與綠色繽紛嘉年華！🌈 讓我們共同營造更綠色、更潔淨的校園生活環境，推動循環與可持續未來！♻️✨🌍</p>
        <div style="text-align: center; font-size: 3rem; margin-top: 20px;">🗺️</div>
        <p style="text-align: center; color: #666;">(活動地圖區域)</p>
    </div>
</div>

<div id="scanModal" class="modal">
    <div class="modal-content">
        <h3>掃描成功！✨</h3>
        <p>請輸入印花換取密碼以完成集印：</p>
        <input type="password" id="stampPassword" placeholder="輸入密碼">
        <button class="btn" onclick="closeModal()">確認換取</button>
    </div>
</div>

<nav>
    <button onclick="showPage(1)">集印花主頁</button>
    <button onclick="showPage(2)">活動地圖</button>
</nav>

<script>
    // 1. 更新時間功能
    function updateClock() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('zh-HK', { hour12: false });
        document.getElementById('current-time').innerText = `現在時間：${timeString}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. 頁面切換邏輯
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageId).classList.add('active');
    }

    // 3. 模擬掃描與整合 Pop-up 邏輯
    function simulateScan() {
        // 直接開啟整合了輸入框的彈窗
        document.getElementById('scanModal').style.display = 'flex';
    }

    function closeModal() {
        const pw = document.getElementById('stampPassword').value;
        if(pw) {
            alert('成功獲取印花！');
            document.getElementById('scanModal').style.display = 'none';
            document.getElementById('stampPassword').value = '';
        } else {
            alert('請輸入密碼');
        }
    }

    // 點擊 Modal 外部關閉 (選擇性)
    window.onclick = function(event) {
        let modal = document.getElementById('scanModal');
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
