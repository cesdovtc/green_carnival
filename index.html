<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>綠色繽紛嘉年華 2026</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        /* ==========================================
           CSS 模組 1：基礎設定與變數
           ========================================== */
        :root { 
            --green: #2ecc71;
            --dark-green: #1b5e20;
            --gold: #f1c40f;
            --soft-green: #e8f5e9;
            --glass: rgba(255, 255, 255, 0.85);
            --chat-bg: #eafaf1;
        }
        
        * { box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        
        body { 
            background: linear-gradient(180deg, #f4fbf7 0%, #dff0e6 100%); 
            margin: 0; 
            padding-bottom: 100px;
            min-height: 100vh; 
            overflow-x: hidden;
            color: #2c3e50;
        }

        /* ==========================================
           CSS 模組 2：防止抖動優化與動畫
           ========================================== */
        .header {
            background: linear-gradient(135deg, var(--dark-green) 0%, var(--green) 100%);
            color: white; 
            padding: 30px 20px; 
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 優化後的時鐘：防止每秒跳動導致版面晃動 */
        #live-clock {
            font-size: 13px;
            margin-top: 8px;
            opacity: 0.9;
            /* 使用等寬字體是防止抖動的關鍵 */
            font-family: Consolas, Monaco, 'Courier New', monospace; 
            display: inline-block;
            min-height: 1.2em;
            letter-spacing: 0.5px;
        }

        /* 應用的 Logo 容器：開啟硬體加速 */
        .logo-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            /* 讓文字也包在裡面享受穩定特效 */
            will-change: transform;
            transform: translateZ(0); 
        }

        /* 漂浮綠點與葉子 */
        .dot, .leaf { 
            position: absolute; 
            pointer-events: none; 
            backface-visibility: hidden; /* 防止旋轉時抖動 */
        }
        .dot {
            background: var(--green); 
            border-radius: 50%; 
            opacity: 0.15; 
            animation: float 15s infinite linear;
        }
        @keyframes float { 
            0% { transform: translateY(90vh) scale(0.5) translateZ(0); opacity: 0; } 
            50% { opacity: 0.2; }
            100% { transform: translateY(10vh) scale(1.2) translateZ(0); opacity: 0; } 
        }
        
        .leaf {
            font-size: 20px;
            opacity: 0.6;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-5vh) rotate(0deg) translateZ(0); }
            100% { transform: translateY(95vh) rotate(360deg) translateZ(0); }
        }

        /* ==========================================
           CSS 模組 3：卡片與排版
           ========================================== */
        .tab-content { 
            display: none; 
            padding: 15px; 
            max-width: 600px; 
            margin: auto; 
            animation: fadeIn 0.4s ease-out;
        }
        .active-tab { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) translateZ(0); }
            to { opacity: 1; transform: translateY(0) translateZ(0); }
        }

        .glass-card { 
            background: var(--glass); 
            border-radius: 24px; 
            padding: 22px; 
            margin-bottom: 22px; 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* 兼容 iOS */
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
            margin-top: 20px; 
        }
        .stamp-box { text-align: center; cursor: pointer; }
        .stamp { 
            width: 100%; 
            max-width: 80px; 
            aspect-ratio: 1 / 1; 
            border: 2px dashed #bdc3c7; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 34px; background: white; margin: auto; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .stamp.active { 
            border: 3px solid var(--gold); 
            background: #fffde7; 
            transform: rotate(5deg) scale(1.1);
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.3);
        }

        .stall-name {
            font-size: 13px; font-weight: bold; margin-top: 10px; color: #34495e;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; height: 32px; line-height: 1.2;
        }

        /* 按鈕樣式 */
        .btn-prize { 
            width: 100%; padding: 20px 18px; border-radius: 18px; border: none; 
            margin-bottom: 15px; font-weight: 800; font-size: 18px; 
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .state-locked { background: #eaeded; color: #95a5a6; }
        .state-ready { background: linear-gradient(135deg, var(--gold) 0%, #f39c12 100%); color: white; cursor: pointer; animation: pulse 2s infinite; }
        .state-done { background: #e8f5e9; color: var(--green); border: 1px dashed var(--green); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.6); }
            70% { box-shadow: 0 0 0 12px rgba(241, 196, 15, 0); }
            100% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0); }
        }

        /* 導航與彈窗 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; border-top: 1px solid #eee; z-index: 999; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bdc3c7; cursor: pointer; }
        .nav-item.active { color: var(--green); font-weight: bold; }
        .nav-item span { font-size: 22px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; }
        .modal-content { background: white; width: 88%; max-width: 400px; margin: 20% auto; padding: 30px 25px; border-radius: 25px; text-align: center; animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* 助手按鈕 */
        .chat-btn { position: fixed; bottom: 85px; right: 20px; width: 55px; height: 55px; background: linear-gradient(135deg, var(--green), #27ae60); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; color: white; z-index: 998; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .chat-modal { display: none; position: fixed; bottom: 150px; right: 20px; width: 300px; max-width: 85vw; background: white; border-radius: 20px; z-index: 1000; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.15); animation: slideUp 0.3s ease-out; }
        .chat-header { background: var(--dark-green); color: white; padding: 12px 15px; font-weight: bold; display: flex; justify-content: space-between; }
        .chat-body { padding: 15px; max-height: 250px; overflow-y: auto; }
        .bot-bubble { background: var(--chat-bg); padding: 10px 14px; border-radius: 15px 15px 15px 0; margin-bottom: 10px; font-size: 14px; border: 1px solid rgba(46, 204, 113, 0.2); }
        .chat-option { display: block; width: 100%; background: white; border: 1px solid var(--green); color: var(--dark-green); padding: 8px 12px; border-radius: 10px; margin-bottom: 6px; font-size: 13px; text-align: left; }

        .eco-icon-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .eco-icon-item { background: white; padding: 10px 5px; border-radius: 12px; border: 1px solid #eafaf1; text-align: center; }
        .eco-icon-item span { font-size: 24px; }
        .eco-icon-item div { font-size: 11px; color: #7f8c8d; }
    </style>
</head>
<body>

    <div id="bgDots"></div>

    <audio id="stampAudio" preload="auto"><source src="stamp_award.mp3" type="audio/mpeg"></audio>
    <audio id="giftAudio" preload="auto"><source src="gift_award.mp3" type="audio/mpeg"></audio>

    <div class="header">
        <div class="logo-container">
            <h2 style="margin: 5px 0;">🌿 可持續發展嘉年華暨</h2>
            <h2 style="margin: 5px 0;"> VTC學生環保大使計劃嘉許禮</h2>
            <div style="font-size: 16px; opacity: 0.9; letter-spacing: 1px;">愛地球 . 為未來</div>
            <div id="live-clock">載入中...</div>
        </div>
    </div>

    <div id="tab-stamps" class="tab-content active-tab">
        <div class="glass-card" style="margin-top: 10px; text-align: center;">
            <img src="cesdo_yc_logo.png" style="width:100%; border-radius:15px; cursor: pointer;">
        </div>

        <div class="grid" id="mainGrid"></div>
        
        <div class="glass-card" style="margin-top: 25px;">
            <div id="progText" style="font-size: 18px; font-weight: 800; color: var(--dark-green);">我的印花進度：0 / 16</div>
            <div class="bar-bg"><div class="bar-fill" id="pBar"></div></div>
        </div>

        <div class="glass-card">
            <div style="font-weight: 900; color: var(--dark-green); margin-bottom: 20px; font-size: 20px; display: flex; align-items: center;">
                <span style="margin-right: 8px;">🎁</span> 獎勵換領處
            </div>
            <div id="redeemButtons">
                <button id="btn-2" class="btn-prize state-locked" onclick="openRedeemModal(2)"><span>細獎 (2個印花)</span><small id="status-2">鎖定中</small></button>
                <button id="btn-5" class="btn-prize state-locked" onclick="openRedeemModal(5)"><span>中獎 (5個印花)</span><small id="status-5">鎖定中</small></button>
                <button id="btn-8" class="btn-prize state-locked" onclick="openRedeemModal(8)"><span>大獎 (8個印花)</span><small id="status-8">鎖定中</small></button>
            </div>
        </div>
    </div>

    <div id="tab-map" class="tab-content">
        <div class="glass-card" style="margin-top: 10px;">
            <img src="cesdo_yc_logo.png" style="width:100%; border-radius:15px; cursor: pointer;">
        </div>

        <div class="glass-card">
            <h3 style="color: var(--dark-green); margin-top:0;">📍 活動資訊</h3>
            <p style="font-size: 14px;"><b>日期：</b> 2026年4月21日</p>
            <p style="font-size: 14px;"><b>時間：</b> 11:30am - 2:30pm</p>
            <p style="font-size: 14px;"><b>地點：</b> 職業訓練局 九龍灣大樓</p>
            <img src="KBC_Address.jpg" style="width:100%; border-radius:15px; margin-top:10px;">
            
            <h4 style="color: var(--dark-green); margin: 20px 0 10px 0;">🌱 我們的綠色願景</h4>
            <div class="eco-icon-grid">
                <div class="eco-icon-item"><span>💡</span><div>節約能源</div></div>
                <div class="eco-icon-item"><span>🚲</span><div>低碳出行</div></div>
                <div class="eco-icon-item"><span>🐼</span><div>保護生態</div></div>
                <div class="eco-icon-item"><span>🌊</span><div>海洋守護</div></div>
            </div>
        </div>
    </div>

    <div class="chat-btn" onclick="toggleChat()">💬</div>
    <div class="chat-modal" id="chatModal">
        <div class="chat-header"><span>🤖 綠色小助手</span><span style="cursor:pointer;" onclick="toggleChat()">✕</span></div>
        <div class="chat-body">
            <div class="bot-bubble" id="botReply">你好呀！我是你的綠色助手。今天有什麼我可以幫到你？</div>
            <button class="chat-option" onclick="askBot('我點樣可以集齊印花？')">👉 我點樣可以集齊印花？</button>
            <button class="chat-option" onclick="askBot('獎勵換領處喺邊度？')">👉 獎勵換領處喺邊度？</button>
            <button class="chat-option" onclick="askBot('有咩環保小貼士？')">👉 有咩環保小貼士？</button>
        </div>
    </div>

    <div class="nav-bar">
        <div id="nav-stamps" class="nav-item active" onclick="switchTab('stamps')"><span>🎫</span><div>我的印花</div></div>
        <div id="nav-map" class="nav-item" onclick="switchTab('map')"><span>🗺️</span><div>活動地圖</div></div>
    </div>

    <div id="uiModal" class="modal">
        <div class="modal-content">
            <div id="modalIcon" style="font-size: 60px;"></div>
            <h3 id="modalTitle"></h3>
            <div id="ecoTip" class="eco-tip-box"></div>
            <p id="modalDesc"></p>
            <div id="verifyArea" style="display:none;">
                <input type="number" id="vCodeInput" class="code-input" placeholder="工作人員密碼" style="width:100%; padding:15px; font-size:22px; text-align:center; margin:15px 0; border:1px solid #ddd; border-radius:12px;">
                <button class="btn-main" id="confirmBtn" style="background:var(--green); color:white; border:none; padding:16px; border-radius:15px; width:100%; font-weight:bold;">確認蓋印 🤗</button>
            </div>
            <div id="redeemArea" style="display:none;">
                <button class="btn-main" id="redeemConfirmBtn" style="background:var(--gold); color:white; border:none; padding:16px; border-radius:15px; width:100%; font-weight:bold;">確認領取獎勵 🥳</button>
            </div>
            <button class="btn-cancel" onclick="closeModal()" style="background:none; border:none; color:#999; margin-top:15px; text-decoration:underline;">返回</button>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwhlFCOQkSlELkFcFZVD6fQU_GEpnmuaaXRg8rALlsW4gvXeSWSTcUsc612IosrFEns/exec"; 
    const SALT = 0; 

    const STALLS = [
        { id: 'QR1', icon: '💰', name: '攤位1: 低碳智慧收費系統', tip: '使用電子支付，減少紙幣製造產生的碳足跡。' },
        { id: 'QR2', icon: '🚉', name: '攤位2: 綠智通勤樞紐', tip: '多搭巴士地鐵，每公里可減少約 150g 碳排放。' },
        { id: 'QR3', icon: '👕', name: '攤位3: 衣物回收 你要知', tip: '回收舊衣能節省大量水資源，讓資源循環再生。' },
        { id: 'QR4', icon: '🔌', name: '攤位4: 環保斷線危機', tip: '拔掉待機電器插頭，每年可節省約 10% 電力。' },
        { id: 'QR5', icon: '🎚️', name: '攤位5: 智惜讀錶', tip: '實時監察用電量，有助識別不必要的能源消耗。' },
        { id: 'QR6', icon: '🗑️', name: '攤位6: A6 回收垃圾桶', tip: '正確分類回收，能大幅減輕堆填區的負荷。' },
        { id: 'QR7', icon: '♻️', name: '攤位7: 垃圾終結者：分類反擊', tip: '回收前請先妥善處理，能提升回收再造的成功率。' },
        { id: 'QR8', icon: '🎓', name: '攤位8: 綠色教育角', tip: '學習環保知識，是守護地球的第一步。' },
        { id: 'QR9', icon: '🌏', name: '攤位9: 綠惜地球', tip: '保護生物多樣性，維持生態平衡，人人有責。' },
        { id: 'QR10', icon: '⛑️', name: '攤位10: 職安特工隊', tip: '在工作和學習中注重安全健康，實現真正的可持續發展。' },
        { id: 'QR11', icon: '💻', name: '攤位11: 妥善回收「四電一腦」', tip: '舊電器含重金屬，必須交由持牌回收商妥善處理。' },
        { id: 'QR12', icon: '🧃', name: '攤位12: 清潔紙包盒回收', tip: '洗淨並剪開紙包盒回收，可轉化為再生紙漿。' },
        { id: 'QR13', icon: '🧩', name: '攤位13: 綠．轉．七巧新玩', tip: '利用廢物製作玩具，既環保又能激發創意。' },
        { id: 'QR14', icon: '📜', name: '攤位14: 再造紙 DIY', tip: '回收廢紙造紙，能減少約 70% 的空氣污染。' },
        { id: 'QR15', icon: '🤖', name: '攤位15: 迷你 WEEE Hero 組裝', tip: '認識電子廢物回收，人人都能成為環保英雄。' },
        { id: 'QR16', icon: '🚌', name: '攤位16: 喵巴士回收車', tip: '流動回收站深入社區，讓減廢變得更方便。' }
    ];

    let userId = localStorage.getItem('vtc_user_id') || ('U' + Date.now());
    localStorage.setItem('vtc_user_id', userId);
    let myStamps = JSON.parse(localStorage.getItem('vtc_stamps_2026')) || [];
    let redeemedHistory = JSON.parse(localStorage.getItem('vtc_redeemed_history')) || [];
    let audioUnlocked = false;

    // 定時更新時鐘
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('zh-HK', { hour12: false });
        document.getElementById('live-clock').innerText = `📅 2026年4月21日 | 🕒 ${timeStr}`;
    }
    setInterval(updateClock, 1000);

    function createDots() {
        const bg = document.getElementById('bgDots');
        for(let i=0; i<15; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.width = dot.style.height = (Math.random() * 15 + 5) + 'px';
            dot.style.animationDelay = (Math.random() * 5) + 's';
            bg.appendChild(dot);
        }
    }

    function createLeaves() {
        const bg = document.getElementById('bgDots');
        const leafEmojis = ['🍃', '🍂', '🍁', '🌱','🌼', '☘️', '🌿', '🌸']; 
        for(let i=0; i<8; i++) {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.innerText = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = (Math.random() * 5 + 5) + 's';
            leaf.style.animationDelay = (Math.random() * 3) + 's';
            bg.appendChild(leaf);
        }
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = ''; 
        STALLS.forEach(s => {
            const isDone = myStamps.includes(s.id);
            grid.innerHTML += `
                <div class="stamp-box" onclick="showTooltip('${s.id}')">
                    <div class="stamp ${isDone ? 'active' : ''}">${isDone ? s.icon : ''}</div>
                    <div class="stall-name">${s.name}</div>
                </div>`;
        });
        const count = Math.min(myStamps.length, 16);
        document.getElementById('progText').innerText = `我的印花進度：${count} / 16`;
        document.getElementById('pBar').style.width = (count / 16 * 100) + '%';

        [2, 5, 8].forEach(lv => {
            const btn = document.getElementById(`btn-${lv}`);
            const status = document.getElementById(`status-${lv}`);
            if (redeemedHistory.includes(lv)) {
                btn.className = "btn-prize state-done"; status.innerText = "已領取 ✓";
            } else if (count >= lv) {
                btn.className = "btn-prize state-ready"; status.innerText = "點擊領取";
            } else {
                btn.className = "btn-prize state-locked"; status.innerText = `差 ${lv - count} 個印花`;
            }
        });
    }

    function openVerifyModal(id) {
        const s = STALLS.find(x => x.id === id);
        document.getElementById('modalIcon').innerText = s.icon;
        document.getElementById('modalTitle').innerText = s.name;
        document.getElementById('ecoTip').innerHTML = `<b>💡 環保小知識：</b><br>${s.tip}`;
        document.getElementById('modalDesc').innerText = "請輸入工作人員提供的密碼。";
        document.getElementById('verifyArea').style.display = 'block';
        document.getElementById('redeemArea').style.display = 'none';
        document.getElementById('uiModal').style.display = 'block';
        document.getElementById('confirmBtn').onclick = () => {
            const val = document.getElementById('vCodeInput').value;
            if (validate(val)) {
                if (!myStamps.includes(id)) {
                    myStamps.push(id);
                    localStorage.setItem('vtc_stamps_2026', JSON.stringify(myStamps));
                    sendToSheet('log', id);
                    triggerEffect('stamp');
                }
                closeModal(); render();
            } else { alert("密碼錯誤！"); }
        };
    }

    function showTooltip(id) {
        if (!myStamps.includes(id)) { openVerifyModal(id); return; }
        const s = STALLS.find(x => x.id === id);
        document.getElementById('modalIcon').innerText = s.icon;
        document.getElementById('modalTitle').innerText = s.name;
        document.getElementById('ecoTip').innerHTML = `<b>💡 環保小知識：</b><br>${s.tip}`;
        document.getElementById('modalDesc').innerText = "✅ 已收集印花！";
        document.getElementById('verifyArea').style.display = 'none';
        document.getElementById('redeemArea').style.display = 'none';
        document.getElementById('uiModal').style.display = 'block';
    }

    function openRedeemModal(lv) {
        document.getElementById('modalIcon').innerText = "🎁";
        document.getElementById('modalTitle').innerText = "領取嘉年華獎勵";
        document.getElementById('ecoTip').innerText = "太棒了！快去換領你的綠色獎勵吧！";
        document.getElementById('modalDesc').innerText = "確認領取前請示予工作人員核實。";
        document.getElementById('verifyArea').style.display = 'none';
        document.getElementById('redeemArea').style.display = 'block';
        document.getElementById('uiModal').style.display = 'block';
        document.getElementById('redeemConfirmBtn').onclick = () => {
            redeemedHistory.push(lv);
            localStorage.setItem('vtc_redeemed_history', JSON.stringify(redeemedHistory));
            sendToSheet('redeem', lv);
            triggerEffect('gift');
            closeModal(); render();
        };
    }

    function validate(code) {
        const now = new Date();
        const h = now.getHours().toString().padStart(2,'0');
        const m = now.getMinutes().toString().padStart(2,'0');
        return code === (parseInt(h + m) + SALT).toString();
    }

    function sendToSheet(action, val) {
        const url = `${API_URL}?action=${action}&${action==='log'?'id':'lv'}=${encodeURIComponent(val)}&uid=${userId}`;
        new Image().src = url;
    }

    function triggerEffect(type) {
        const sound = document.getElementById(type === 'stamp' ? 'stampAudio' : 'giftAudio');
        sound.play().catch(()=>{});
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
        document.getElementById('tab-' + t).classList.add('active-tab');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + t).classList.add('active');
        if (!audioUnlocked) {
            const s1 = document.getElementById('stampAudio');
            const s2 = document.getElementById('giftAudio');
            s1.play().then(()=>{s1.pause(); s1.currentTime=0;});
            s2.play().then(()=>{s2.pause(); s2.currentTime=0;});
            audioUnlocked = true;
        }
    }

    function closeModal() { document.getElementById('uiModal').style.display = 'none'; document.getElementById('vCodeInput').value = ''; }
    function toggleChat() { const m = document.getElementById('chatModal'); m.style.display = (m.style.display==='block')?'none':'block'; }
    function askBot(q) {
        const r = document.getElementById('botReply');
        r.innerText = "⏳ 思考中...";
        setTimeout(() => {
            if (q.includes('印花')) r.innerText = "完成活動並向工作人員索取密碼即可蓋印！";
            else if (q.includes('獎勵')) r.innerText = "集齊 2/5/8 個印花可到換領處領獎。";
            else r.innerText = "隨身攜帶水樽，減少使用即棄膠樽！🧂";
        }, 800);
    }

    window.onload = () => { createDots(); createLeaves(); updateClock(); render(); };
</script>
</body>
</html>
