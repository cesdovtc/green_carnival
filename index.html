<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>綠色繽紛嘉年華 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --green: #2ecc71; 
            --dark-green: #1b5e20; 
            --gold: #f1c40f; 
            --soft-green: #e8f5e9;
            --glass: rgba(255, 255, 255, 0.85);
        }
        * { box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        body { 
            background: linear-gradient(180deg, #f4fbf7 0%, #dff0e6 100%); 
            margin: 0; padding-bottom: 100px; min-height: 100vh; overflow-x: hidden; color: #2c3e50;
        }
        .header {
            background: linear-gradient(135deg, var(--dark-green) 0%, var(--green) 100%);
            color: white; padding: 30px 20px; text-align: center;
            border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .dot { position: absolute; background: var(--green); border-radius: 50%; opacity: 0.15; animation: float 15s infinite linear; pointer-events: none; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0.5); opacity: 0; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }
        
        .tab-content { display: none; padding: 15px; max-width: 600px; margin: auto; }
        .active-tab { display: block; }
        
        .glass-card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        .bar-bg { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .bar-fill { background: var(--green); height: 100%; width: 0%; transition: 1s; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .stamp-box { text-align: center; }
        .stamp { width: 80px; height: 80px; border: 2px dashed #ccc; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 35px; background: white; margin: auto; transition: 0.3s; }
        .stamp.active { border: 3px solid var(--gold); background: #fffde7; transform: rotate(5deg); }

        .btn-prize { width: 100%; padding: 15px; border-radius: 15px; border: none; margin-bottom: 10px; font-weight: bold; display: flex; justify-content: space-between; }
        .state-locked { background: #eee; color: #999; }
        .state-ready { background: var(--gold); color: #744b00; cursor: pointer; }
        .state-done { background: #e8f5e9; color: var(--green); border: 1px dashed var(--green); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; border-top: 1px solid #eee; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; cursor: pointer; }
        .nav-item.active { color: var(--green); font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000; }
        .modal-content { background: white; width: 85%; max-width: 400px; margin: 20% auto; padding: 25px; border-radius: 25px; text-align: center; }
        .eco-tip-box { background: #f0f9f4; padding: 15px; border-radius: 15px; text-align: left; margin: 15px 0; border-left: 4px solid var(--green); }
        .code-input { width: 100%; padding: 12px; font-size: 20px; text-align: center; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn-main { background: var(--green); color: white; border: none; padding: 12px 30px; border-radius: 25px; width: 100%; font-size: 16px; cursor: pointer; }
        .btn-cancel { background: none; border: none; color: #999; margin-top: 10px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

    <div id="bgDots"></div>

    <audio id="stampAudio" preload="auto"><source src="stamp_award.mp3" type="audio/mpeg"></audio>
    <audio id="giftAudio" preload="auto"><source src="gift_award.mp3" type="audio/mpeg"></audio>

    <div class="header">
        <h2>🌿 綠色繽紛嘉年華 2026</h2>
        <div class="slogan">集印花 . 換好禮 . 愛地球</div>
        <div id="live-clock">載入中...</div>
    </div>

    <div id="tab-stamps" class="tab-content active-tab">
        <div class="glass-card">
            <div id="progText" style="font-size: 18px; font-weight: 800; color: var(--dark-green);">我的印花進度：0 / 12</div>
            <div class="bar-bg"><div class="bar-fill" id="pBar"></div></div>
        </div>
        <div class="grid" id="mainGrid"></div>
        <div class="glass-card" style="margin-top: 25px;">
            <div style="font-weight: 800; color: var(--dark-green); margin-bottom: 15px;">🎁 獎勵領取處</div>
            <div id="redeemButtons">
                <button id="btn-6" class="btn-prize state-locked" onclick="openRedeemModal(6)"><span>細獎 (6個印花)</span><small id="status-6">鎖定中</small></button>
                <button id="btn-9" class="btn-prize state-locked" onclick="openRedeemModal(9)"><span>中獎 (9個印花)</span><small id="status-9">鎖定中</small></button>
                <button id="btn-12" class="btn-prize state-locked" onclick="openRedeemModal(12)"><span>大獎 (12個印花)</span><small id="status-12">鎖定中</small></button>
            </div>
        </div>
    </div>

    <div id="tab-map" class="tab-content">
        <div class="glass-card">
            <h3 style="color: var(--dark-green); margin-top:0;">📍 活動資訊</h3>
            <p><b>日期：</b> 2026年4月21日</p>
            <p><b>時間：</b> 11:30am - 2:30pm</p>
            <p><b>地點：</b> 職業訓練局 九龍灣大樓</p>
            <p style="font-size:14px; line-height:1.5;">歡迎參與綠色繽紛嘉年華暨環保大使計劃閉幕禮！</p>
            <img src="KBC_Address.jpg" style="width:100%; border-radius:15px; margin-top:10px;" onclick="window.open(this.src)">
        </div>
    </div>

    <div class="nav-bar">
        <div id="nav-stamps" class="nav-item active" onclick="switchTab('stamps')"><span>🎫</span><div>我的印花</div></div>
        <div id="nav-map" class="nav-item" onclick="switchTab('map')"><span>🗺️</span><div>活動地圖</div></div>
    </div>

    <div id="uiModal" class="modal">
        <div class="modal-content">
            <div id="modalIcon" style="font-size: 60px;"></div>
            <h3 id="modalTitle" style="margin: 10px 0;"></h3>
            <div id="ecoTip" class="eco-tip-box"></div>
            <p id="modalDesc" style="color: #666; font-size: 14px;"></p>
            
            <div id="verifyArea" style="display:none;">
                <input type="number" id="vCodeInput" class="code-input" placeholder="工作人員密碼">
                <button class="btn-main" id="confirmBtn">確認蓋印 🌱</button>
            </div>
            
            <div id="redeemArea" style="display:none;">
                <button class="btn-main" id="redeemConfirmBtn" style="background: var(--gold); color: #744b00;">確認領取禮品 ✨</button>
            </div>
            
            <button class="btn-cancel" onclick="closeModal()">返回</button>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbySGCPsBNDjXo7iH2PCMkOlppRqOVcsrNF-AIyXbatOD2lhfhPMKvuXjUbuQO09ETst/exec"; 
    const SALT = 0; 

    const STALLS = [
        { id: 'QR1', icon: '♻️', name: '分類回收', tip: '回收 1 噸廢紙可挽救 17 棵大樹！' },
        { id: 'QR2', icon: '☀️', name: '再生能源', tip: '太陽能是地球最充足的能源。' },
        { id: 'QR3', icon: '🚲', name: '低碳交通', tip: '多搭乘公共交通每公里減少 150g 碳排放。' },
        { id: 'QR4', icon: '🌲', name: '森林保護', tip: '森林是地球的肺，守護氧氣來源。' },
        { id: 'QR5', icon: '💧', name: '節約水種', tip: '淋浴少 1 分鐘，可節省 10 公升水。' },
        { id: 'QR6', icon: '🔋', name: '電池回收', tip: '廢電池請送往回收點，防止土壤污染。' },
        { id: 'QR7', icon: '🥦', name: '低碳飲食', tip: '少吃肉多吃菜，每餐減排 1.5kg 二氧化碳。' },
        { id: 'QR8', icon: '💡', name: '節能減排', tip: '更換 LED 燈泡可省電 75%。' },
        { id: 'QR9', icon: '🌊', name: '守護海洋', tip: '減少使用即棄塑膠，保護海洋生物。' },
        { id: 'QR10', icon: '🛠️', name: '升級再造', tip: 'Upcycling 能延續廢棄物料的壽命。' },
        { id: 'QR11', icon: '🐝', name: '生物多樣', tip: '保護蜜蜂就是保護人類糧食來源。' },
        { id: 'QR12', icon: '🌬️', name: '空氣清新', tip: '虎尾蘭能有效過濾室內有害氣體。' }
    ];

    let userId = localStorage.getItem('vtc_user_id') || ('U' + Date.now());
    localStorage.setItem('vtc_user_id', userId);
    let myStamps = JSON.parse(localStorage.getItem('vtc_stamps_2026')) || [];
    let redeemedHistory = JSON.parse(localStorage.getItem('vtc_redeemed_history')) || [];
    let audioUnlocked = false;

    function createDots() {
        const bg = document.getElementById('bgDots');
        for(let i=0; i<15; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.width = dot.style.height = (Math.random() * 15 + 5) + 'px';
            dot.style.animationDelay = (Math.random() * 5) + 's';
            bg.appendChild(dot);
        }
    }

    function unlockAudio() {
        if (audioUnlocked) return;
        const s1 = document.getElementById('stampAudio');
        const s2 = document.getElementById('giftAudio');
        s1.play().then(() => { s1.pause(); s1.currentTime = 0; });
        s2.play().then(() => { s2.pause(); s2.currentTime = 0; });
        audioUnlocked = true;
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        STALLS.forEach(s => {
            const isDone = myStamps.includes(s.id);
            grid.innerHTML += `
                <div class="stamp-box" onclick="showTooltip('${s.id}')">
                    <div class="stamp ${isDone ? 'active' : ''}">${isDone ? s.icon : ''}</div>
                    <div style="font-size:12px; margin-top:5px;">${s.name}</div>
                </div>`;
        });
        const count = Math.min(myStamps.length, 12);
        document.getElementById('progText').innerText = `我的印花進度：${count} / 12`;
        document.getElementById('pBar').style.width = (count / 12 * 100) + '%';

        [6, 9, 12].forEach(lv => {
            const btn = document.getElementById(`btn-${lv}`);
            const status = document.getElementById(`status-${lv}`);
            if (redeemedHistory.includes(lv)) {
                btn.className = "btn-prize state-done"; status.innerText = "已領取 ✓";
            } else if (count >= lv) {
                btn.className = "btn-prize state-ready"; status.innerText = "點擊領取";
            } else {
                btn.className = "btn-prize state-locked"; status.innerText = `差 ${lv - count} 個`;
            }
        });
    }

    function openVerifyModal(id) {
        const s = STALLS.find(x => x.id === id);
        document.getElementById('modalIcon').innerText = s.icon;
        document.getElementById('modalTitle').innerText = s.name;
        document.getElementById('ecoTip').innerHTML = `<b>💡 環保小知識：</b><br>${s.tip}`;
        document.getElementById('modalDesc').innerText = "請輸入工作人員提供的密碼。";
        document.getElementById('verifyArea').style.display = 'block';
        document.getElementById('redeemArea').style.display = 'none';
        document.getElementById('uiModal').style.display = 'block';
        document.getElementById('confirmBtn').onclick = () => {
            const val = document.getElementById('vCodeInput').value;
            if (validate(val)) {
                if (!myStamps.includes(id)) {
                    myStamps.push(id);
                    localStorage.setItem('vtc_stamps_2026', JSON.stringify(myStamps));
                    sendToSheet('log', id);
                    triggerEffect('stamp');
                }
                closeModal(); render();
            } else { alert("密碼錯誤！"); }
        };
    }

    function showTooltip(id) {
        if (!myStamps.includes(id)) {
            openVerifyModal(id);
            return;
        }
        const s = STALLS.find(x => x.id === id);
        document.getElementById('modalIcon').innerText = s.icon;
        document.getElementById('modalTitle').innerText = s.name;
        document.getElementById('ecoTip').innerHTML = `<b>💡 環保小知識：</b><br>${s.tip}`;
        document.getElementById('modalDesc').innerText = "✅ 您已完成挑戰！";
        document.getElementById('verifyArea').style.display = 'none';
        document.getElementById('redeemArea').style.display = 'none';
        document.getElementById('uiModal').style.display = 'block';
    }

    function openRedeemModal(lv) {
        if (myStamps.length < lv || redeemedHistory.includes(lv)) return;
        document.getElementById('modalIcon').innerText = "🎁";
        document.getElementById('modalTitle').innerText = "領取獎勵";
        document.getElementById('ecoTip').innerText = "太棒了！感謝你為地球出一分力！";
        document.getElementById('modalDesc').innerText = "請將此畫面示予禮品換領處人員。";
        document.getElementById('verifyArea').style.display = 'none';
        document.getElementById('redeemArea').style.display = 'block';
        document.getElementById('uiModal').style.display = 'block';
        document.getElementById('redeemConfirmBtn').onclick = () => {
            redeemedHistory.push(lv);
            localStorage.setItem('vtc_redeemed_history', JSON.stringify(redeemedHistory));
            sendToSheet('redeem', lv);
            triggerEffect('gift');
            closeModal(); render();
        };
    }

    function validate(code) {
        const now = new Date();
        const h = now.getHours().toString().padStart(2,'0');
        const m = now.getMinutes().toString().padStart(2,'0');
        return code === (parseInt(h + m) + SALT).toString();
    }

    function sendToSheet(action, val) {
        const url = `${API_URL}?action=${action}&${action==='log'?'id':'lv'}=${encodeURIComponent(val)}&uid=${userId}`;
        new Image().src = url;
    }

    function triggerEffect(type) {
        const sound = document.getElementById(type === 'stamp' ? 'stampAudio' : 'giftAudio');
        sound.play().catch(()=>{});
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
        document.getElementById('tab-' + t).classList.add('active-tab');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + t).classList.add('active');
        unlockAudio();
    }

    function closeModal() {
        document.getElementById('uiModal').style.display = 'none';
        document.getElementById('vCodeInput').value = '';
    }

    function init() {
        createDots();
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleString('zh-HK'); }, 1000);
        const qid = new URLSearchParams(window.location.search).get('id');
        if (qid && STALLS.some(s => s.id === qid)) {
            setTimeout(() => { myStamps.includes(qid) ? showTooltip(qid) : openVerifyModal(qid); }, 500);
        }
        render();
    }

    init();
</script>
</body>
</html>
