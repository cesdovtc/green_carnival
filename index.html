<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠色繽紛嘉年華 - 電子集印系統</title>
    <style>
        :root { --green-dark: #1b5e20; --green-light: #4caf50; --accent: #ffc107; }
        body { font-family: "Microsoft JhengHei", -apple-system, sans-serif; background: #f1f8e9; margin: 0; padding: 15px; text-align: center; }
        .container { background: white; border-radius: 25px; padding: 20px; max-width: 420px; margin: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 2px solid #c8e6c9; }
        .header { background: linear-gradient(135deg, var(--green-dark), var(--green-light)); color: white; padding: 18px; border-radius: 20px; margin-bottom: 20px; }
        
        /* 12格網格佈局 */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
        .slot { display: flex; flex-direction: column; align-items: center; }
        .stamp { width: 68px; height: 68px; border: 2px dashed #bdc3c7; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 32px; background: #fff; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .stamp.active { border: 2px solid var(--accent); background: #fff9c4; transform: scale(1.05) rotate(5deg); box-shadow: 0 4px 10px rgba(255,193,7,0.3); }
        .label { font-size: 10px; color: #555; margin-top: 6px; font-weight: bold; white-space: nowrap; }

        /* 獎勵進度 */
        .reward-box { background: #e8f5e9; border-radius: 15px; padding: 12px; margin: 15px 0; border: 1px solid #a5d6a7; font-size: 13px; color: var(--green-dark); }
        .progress-container { background: #eee; height: 14px; border-radius: 7px; overflow: hidden; margin: 10px 0; border: 1px solid #ddd; }
        .progress-bar { background: linear-gradient(90deg, #81c784, #4caf50); height: 100%; width: 0%; transition: 0.7s ease-in-out; }
        
        .btn-redeem { background: #ff5722; color: white; border: none; padding: 16px; border-radius: 15px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; display: none; margin-top: 15px; box-shadow: 0 4px 15px rgba(255,87,34,0.3); }
        .done-msg { background: #4caf50; color: white; padding: 12px; border-radius: 12px; font-weight: bold; margin-top: 15px; display: none; }
        
        .footer { margin-top: 25px; font-size: 11px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 24px;">🌿 綠色繽紛嘉年華</h1>
        <div style="font-size: 13px; margin-top: 5px; opacity: 0.9;">集印花 ‧ 換好禮 ‧ 愛地球</div>
    </div>

    <div class="reward-box">
        <strong>🎁 獎勵階梯：</strong><br>
        6個 (初級) | 9個 (中級) | 12個 (終極大獎)
    </div>

    <div class="grid" id="gameGrid"></div>

    <div class="progress-container"><div class="progress-bar" id="pBar"></div></div>
    <p id="counterInfo" style="font-weight:bold; color:#333;">已完成: 0 / 12</p>

    <button id="btnRedeem" class="btn-redeem" onclick="processRedeem()">🎁 領取紀念品</button>
    <div id="statusLabel" class="done-msg"></div>

    <div class="footer">VTC 2026 綠色繽紛嘉年華系統</div>
    <button onclick="if(confirm('重設所有進度？')){localStorage.clear();location.reload();}" style="margin-top:30px; border:none; background:none; color:#ddd; font-size:10px;">系統重設</button>
</div>

<script>
    const SECURITY_KEY = "vtcgc260421";
    // 12個攤位及其 Icon
    const STALLS_DATA = [
        { id: 'QR1', icon: '♻️', name: '分類回收' }, { id: 'QR2', icon: '☀️', name: '再生能源' },
        { id: 'QR3', icon: '🚲', name: '低碳交通' }, { id: 'QR4', icon: '🌲', name: '森林保護' },
        { id: 'QR5', icon: '💧', name: '節約水種' }, { id: 'QR6', icon: '🔋', name: '電池回收' },
        { id: 'QR7', icon: '🥦', name: '素食低碳' }, { id: 'QR8', icon: '💡', name: '節能減排' },
        { id: 'QR9', icon: '🌊', name: '守護海洋' }, { id: 'QR10', icon: '🐝', name: '生物多樣' },
        { id: 'QR11', icon: '👕', name: '舊衣重用' }, { id: 'QR12', icon: '🌬️', name: '空氣清新' }
    ];

    let userStamps = JSON.parse(localStorage.getItem('vtc_green_26')) || [];
    let lastRedeemed = parseInt(localStorage.getItem('vtc_redeem_lv')) || 0;

    function initApp() {
        const urlParams = new URLSearchParams(window.location.search);
        const qid = urlParams.get('id');
        const qkey = urlParams.get('key');

        // 核心修正：確保 qid 存在於 STALLS_DATA 內 (包括 QR12)
        if (qid && qkey === SECURITY_KEY) {
            const found = STALLS_DATA.find(s => s.id === qid);
            if (found && !userStamps.includes(qid)) {
                userStamps.push(qid);
                localStorage.setItem('vtc_green_26', JSON.stringify(userStamps));
                alert(`🎉 恭喜！你已完成：${found.name}`);
                
                // 模擬發送到後台 (Excel 統計)
                sendStat(qid);
            }
            // 修正後清除網址參數
            window.history.replaceState({}, '', window.location.pathname);
        }
        refreshUI();
    }

    function refreshUI() {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = '';
        
        STALLS_DATA.forEach(item => {
            const isActive = userStamps.includes(item.id);
            grid.innerHTML += `
                <div class="slot">
                    <div class="stamp ${isActive ? 'active' : ''}">${isActive ? item.icon : ''}</div>
                    <div class="label">${item.name}</div>
                </div>
            `;
        });

        const currentCount = userStamps.length;
        document.getElementById('counterInfo').innerText = `已集齊: ${currentCount} / 12`;
        document.getElementById('pBar').style.width = (currentCount / 12 * 100) + '%';

        const rb = document.getElementById('btnRedeem');
        const sl = document.getElementById('statusLabel');

        // 判斷分段換獎邏輯
        let canRedeem = false;
        if (currentCount >= 12 && lastRedeemed < 12) canRedeem = true;
        else if (currentCount >= 9 && lastRedeemed < 9) canRedeem = true;
        else if (currentCount >= 6 && lastRedeemed < 6) canRedeem = true;

        if (canRedeem) {
            rb.style.display = 'block';
            sl.style.display = 'none';
        } else if (lastRedeemed > 0) {
            rb.style.display = 'none';
            sl.style.display = 'block';
            sl.innerText = `✅ 已換領 ${lastRedeemed} 個印章獎勵`;
        } else {
            rb.style.display = 'none';
            sl.style.display = 'none';
        }
    }

    function processRedeem() {
        let level = 0;
        if (userStamps.length >= 12) level = 12;
        else if (userStamps.length >= 9) level = 9;
        else if (userStamps.length >= 6) level = 6;

        if (confirm(`請向工作人員出示！確定換領 ${level} 個印章嘅獎品？`)) {
            lastRedeemed = level;
            localStorage.setItem('vtc_redeem_lv', lastRedeemed);
            sendStat('REDEEM_' + level);
            refreshUI();
        }
    }

    function sendStat(action) {
        const API_URL = "https://script.google.com/macros/s/AKfycbySGCPsBNDjXo7iH2PCMkOlppRqOVcsrNF-AIyXbatOD2lhfhPMKvuXjUbuQO09ETst/exec"; // 👈 貼喺呢度
        
        // 用 LocalStorage 隨機生一個 ID 畀呢個用家，方便統計有幾多個獨立訪客
        let uid = localStorage.getItem('vtc_uid');
        if (!uid) {
            uid = 'User_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('vtc_uid', uid);
        }
    
        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors', // 解決跨域問題
            cache: 'no-cache',
            body: JSON.stringify({
                action: action,
                userId: uid
            })
        }).then(() => {
            console.log("數據已同步到 Google Sheet");
        }).catch(err => console.error("傳送失敗:", err));
    }

    initApp();
</script>

</body>
</html>
